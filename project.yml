name: PokopiaBuilder
options:
  bundleIdPrefix: dev.pokopia
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: "NO"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
targets:
  PokopiaBuilder:
    type: application
    platform: macOS
    sources:
      - path: Sources/PokopiaBuilder
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pokopia.builder
        PRODUCT_NAME: PokopiaBuilder
        INFOPLIST_FILE: Sources/PokopiaBuilder/Info.plist
        CODE_SIGN_ENTITLEMENTS: config/PokopiaBuilder-AppStore.entitlements
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "NO"
        ARCHS: arm64
        ENABLE_HARDENED_RUNTIME: "YES"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    scheme:
      testTargets: []
